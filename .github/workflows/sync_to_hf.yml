name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # We do not pull LFS files since we exclude the data folder from the HF sync anyway.
        # This keeps the action execution extremely fast.

      - name: Push to Hugging Face Space via Git
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clean up folders/files we don't want to push
          rm -rf data training_data .git .github .gitattributes .venv
          
          # Initialize a fresh git repository to push a clean snapshot of code
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b main
          git add .
          git commit -m "Deploy to Hugging Face Space"
          
          # Push to the existing Space repository using the HF token for authentication
          git remote add hf https://ShaanNeedsHugs:${HF_TOKEN}@huggingface.co/spaces/ShaanNeedsHugs/farmRisk
          git push -f hf main



