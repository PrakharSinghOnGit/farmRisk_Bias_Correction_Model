name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # We do not pull LFS files since we exclude the data folder from the HF sync anyway.
        # This keeps the action execution extremely fast.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hugging Face Hub CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the new hf command to upload to the Hugging Face Space
          hf upload \
            ShaanNeedsHugs/farmRisk \
            . \
            . \
            --repo-type space \
            --exclude "data/*" \
            --exclude "training_data/*" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".venv/*" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"


